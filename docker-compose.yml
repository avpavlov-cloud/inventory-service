version: '3.8'

services:
  mongodb:
    image: mongo:6.0 
    container_name: mongodb_inventory
    # Добавляем флаг репликации rs0
    command: ["--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    healthcheck: # Добавляем проверку готовности
      test: echo "try { rs.status() } catch (err) { rs.initiate() }" | mongosh --quiet
      interval: 5s
      timeout: 5s
      retries: 5


  app:
    build:
      context: .
      dockerfile: Dockerfile.dev # Указываем на файл для разработки
    container_name: inventory_app
    ports:
      - "8080:8080"
    environment:
      - MONGO_URI=mongodb://mongodb:27017
    volumes:
      - .:/app # КРИТИЧНО: связывает твой код на диске с контейнером
    depends_on:
      - mongodb
    tty: true
    stdin_open: true

volumes:
  mongo_data:
